<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07060a" />
  <title>404 — SCORY</title>
  <link rel="stylesheet" href="./defaut.css" />
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--surface-void); color: rgba(245,242,255,0.85);
      font-family: var(--font-sans); text-align: center; padding: 2rem;
    }
    .error-code {
      font-family: var(--font-mono); font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 700; color: var(--accent-gold); opacity: 0.15;
      line-height: 1; margin: 0;
    }
    .error-msg {
      font-family: var(--font-display); font-size: clamp(1rem, 3vw, 1.5rem);
      font-style: italic; color: rgba(245,242,255,0.6); margin: 1rem 0 2rem;
    }
    .error-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.6rem; border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-amber));
      color: var(--surface-void); text-decoration: none;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .error-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,169,98,0.35);
    }
  </style>
</head>
<body>
  <div>
    <p class="error-code">404</p>
    <p class="error-msg">Cette page n'existe pas dans le musee.</p>
    <a href="./" class="error-link">Retour au portfolio</a>
  </div>
</body>
</html>
